<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Light mode version - white background with colored icon -->
  <rect width="40" height="40" rx="10" fill="white"/>
  
  <!-- V shape - colored -->
  <path d="M8 28 L20 10 L32 28" stroke="url(#gradientLight)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <defs>
    <linearGradient id="gradientLight" x1="8" y1="10" x2="32" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
</svg>