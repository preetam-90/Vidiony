<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Logo Icon - Clear V shape -->
  <g transform="translate(0, 5)">
    <!-- Background shape -->
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#gradient1)"/>
    <!-- V shape -->
    <path d="M8 28 L20 10 L32 28" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Text - Vidiony -->
  <text x="52" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="currentColor" class="logo-text">
    Vidiony
  </text>
  
  <defs>
    <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
</svg>